<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tes Kecermatan - Persona Research & Consulting</title>
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --gray: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border-top: 6px solid var(--navy);
        }
        h2 { color: var(--navy); margin-bottom: 5px; font-size: 20px; }
        .brand { font-weight: bold; color: var(--navy); margin: 0; font-size: 14px; }
        .exp-info { font-size: 11px; color: #ef4444; margin-bottom: 20px; font-style: italic; }
        
        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--navy); }

        .menu-grid { display: none; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .btn {
            background: var(--navy);
            color: #fff;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            display: block;
        }
        .btn:hover { background: #1a3a5f; transform: scale(1.02); }
        #errorMsg { color: #c0392b; font-size: 13px; margin-top: 5px; display: none; }
        footer { margin-top: 25px; font-size: 11px; color: #94a3b8; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>PORTAL SIMULASI</h2>
    <p class="brand">Persona Research & Consulting</p>
    <p class="exp-info">Akses aktif selama 1 minggu</p>

    <!-- Form Password -->
    <div id="authBox">
        <input type="password" id="passInput" placeholder="Masukkan Password Akses...">
        <br>
        <button class="btn" style="width: 93%; margin: 10px auto;" onclick="checkAccess()">BUKA MENU TES</button>
        <p id="errorMsg">Password salah atau akses kedaluwarsa!</p>
    </div>

    <!-- Menu Sesuai File Referensi -->
    <div id="menuBox" class="menu-grid">
        <p style="font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 5px;">PILIH MATERI UJI:</p>
        
        <a href="emoji_1.html" class="btn">1. TES KECERMATAN SIMBOL</a>
        <a href="hewan_jdl.html" class="btn">2. TES GAMBAR HILANG</a>
        <a href="bold_2.html" class="btn">3. TES SILUET KOMBINASI</a>

        <footer>
            WhatsApp: 0877 4251 5786
        </footer>
    </div>
</div>

<script>
    // Konfigurasi Keamanan
    const PASS_KEY = "persona03"; 
    // Set expiry 7 hari dari sekarang (30 April 2026 -> 7 Mei 2026)
    const EXPIRY_DATE = new Date("2026-05-07T23:59:59"); 

    function checkAccess() {
        const input = document.getElementById('passInput').value;
        const now = new Date();
        const errorMsg = document.getElementById('errorMsg');

        if (now > EXPIRY_DATE) {
            errorMsg.textContent = "Masa berlaku akun sudah habis (Expired)!";
            errorMsg.style.display = "block";
            return;
        }

        if (input === PASS_KEY) {
            document.getElementById('authBox').style.display = "none";
            document.getElementById('menuBox').style.display = "grid";
        } else {
            errorMsg.textContent = "Password salah!";
            errorMsg.style.display = "block";
            document.getElementById('passInput').value = "";
        }
    }

    // Support Tombol Enter
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAccess();
    });
</script>

</body>
</html>
