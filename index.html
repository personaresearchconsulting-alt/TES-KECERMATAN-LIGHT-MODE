<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tes Kecermatan - Persona Research & Consulting</title>
    <style>
        :root {
            --navy: #0b2340;
            --gold: #d4a017;
            --gray: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--navy);
        }
        h2 { color: var(--navy); margin-bottom: 10px; }
        .exp-info { font-size: 12px; color: #64748b; margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }
        .menu-grid { display: none; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .btn {
            background: var(--navy);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #1a3a5f; transform: translateY(-2px); }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .locked { display: block; }
        #errorMsg { color: #c0392b; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>PORTAL SIMULASI</h2>
    <p style="font-weight: bold; color: var(--navy); margin: 0;">Persona Research & Consulting</p>
    <p class="exp-info">Akses ini bersifat sementara (Masa aktif 1 minggu)</p>

    <!-- Form Password -->
    <div id="authBox" class="locked">
        <input type="password" id="passInput" placeholder="Masukkan Password Akses...">
        <br>
        <button class="btn" style="width: 87%;" onclick="checkAccess()">BUKA AKSES</button>
        <p id="errorMsg">Password salah atau akses sudah kedaluwarsa!</p>
    </div>

    <!-- Menu Setelah Login -->
    <div id="menuBox" class="menu-grid">
        <p style="font-size: 14px; margin-bottom: 10px;">Pilih Jenis Tes:</p>
        <a href="simbol.html" class="btn">1. TES KECERMATAN SIMBOL</a>
        <a href="gambar-hilang.html" class="btn">2. TES GAMBAR HILANG</a>
        <a href="siluet.html" class="btn">3. TES SILUET KOMBINASI</a>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 20px;">Support WA: 0877 4251 5786</p>
    </div>
</div>

<script>
    // Konfigurasi
    const PASS_KEY = "persona03"; //
    const EXPIRY_DATE = new Date("2026-05-07T23:59:59"); // 1 minggu dari 30 April 2026

    function checkAccess() {
        const input = document.getElementById('passInput').value;
        const now = new Date();
        const errorMsg = document.getElementById('errorMsg');

        if (now > EXPIRY_DATE) {
            errorMsg.textContent = "Akses sudah kedaluwarsa (Expired)!";
            errorMsg.style.display = "block";
            return;
        }

        if (input === PASS_KEY) {
            document.getElementById('authBox').style.display = "none";
            document.getElementById('menuBox').style.display = "grid";
        } else {
            errorMsg.textContent = "Password salah!";
            errorMsg.style.display = "block";
        }
    }

    // Enter Key Support
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAccess();
    });
</script>

</body>
</html>
