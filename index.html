<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persona Test Access</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#0b2340;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:white;
        color:#0b2340;
        padding:30px;
        border-radius:12px;
        width:320px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    input{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:2px solid #ddd;
        border-radius:8px;
        text-align:center;
        font-size:16px;
    }

    button{
        margin-top:15px;
        padding:12px;
        width:100%;
        background:#0b2340;
        color:white;
        border:none;
        border-radius:8px;
        font-weight:bold;
        cursor:pointer;
    }

    .menu{
        display:none;
        flex-direction:column;
        gap:10px;
    }

    .menu a{
        display:block;
        padding:12px;
        background:#f1f5f9;
        border-radius:8px;
        text-decoration:none;
        color:#0b2340;
        font-weight:bold;
    }

    .expired{
        color:red;
        font-weight:bold;
        margin-top:10px;
    }
</style>
</head>

<body>

<div class="box">

    <div id="login">
        <h3>AKSES TES</h3>
        <input type="password" id="pass" placeholder="Masukkan Password">
        <button onclick="login()">MASUK</button>
        <div id="error" style="color:red; font-size:13px;"></div>
    </div>

    <div id="menu" class="menu">
        <h3>MENU TES</h3>

        <a href="bold_2.html">Tes Siluet Kombinasi</a>
        <a href="emoji_1.html">Tes Simbol Emoji</a>
        <a href="hewan_jdl.html">Tes Gambar Hilang</a>

        <div id="expiredInfo" style="font-size:12px;"></div>
    </div>

</div>

<script>

const PASSWORD = "persona03";
const MAX_DEVICE = 6;
const EXPIRE_DAYS = 9;

// ===== LOGIN =====
function login(){
    let input = document.getElementById("pass").value;

    if(input !== PASSWORD){
        document.getElementById("error").innerText = "Password salah!";
        return;
    }

    if(!checkDevice()){
        document.getElementById("error").innerText = "Batas device tercapai!";
        return;
    }

    if(isExpired()){
        document.getElementById("error").innerText = "Akses sudah expired!";
        return;
    }

    startSession();

    document.getElementById("login").style.display = "none";
    document.getElementById("menu").style.display = "flex";

    showExpireInfo();
}

// ===== DEVICE LIMIT =====
function checkDevice(){
    let devices = JSON.parse(localStorage.getItem("devices") || "[]");

    if(!localStorage.getItem("device_id")){
        let id = Math.random().toString(36).substring(2);

        if(devices.length >= MAX_DEVICE){
            return false;
        }

        devices.push(id);
        localStorage.setItem("device_id", id);
        localStorage.setItem("devices", JSON.stringify(devices));
    }

    return true;
}

// ===== SESSION START =====
function startSession(){
    if(!localStorage.getItem("start_time")){
        let now = new Date().getTime();
        localStorage.setItem("start_time", now);
    }
}

// ===== EXPIRED CHECK =====
function isExpired(){
    let start = localStorage.getItem("start_time");
    if(!start) return false;

    let now = new Date().getTime();
    let diff = now - start;

    let days = diff / (1000 * 60 * 60 * 24);

    return days > EXPIRE_DAYS;
}

// ===== INFO EXPIRE =====
function showExpireInfo(){
    let start = localStorage.getItem("start_time");
    if(!start) return;

    let expireDate = new Date(parseInt(start) + (EXPIRE_DAYS * 24 * 60 * 60 * 1000));

    document.getElementById("expiredInfo").innerText =
        "Berlaku sampai: " + expireDate.toLocaleDateString();
}

</script>

</body>
</html>
